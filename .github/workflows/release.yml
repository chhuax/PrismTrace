name: Release Kit

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional release version for manual packaging. Defaults to workspace package version."
        required: false
        default: ""
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos-release:
    name: macOS Release Kit
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Run host discovery smoke test
        run: cargo run -p prismtrace-host -- --discover

      - name: Run release kit smoke test
        run: scripts/test-release-kit.sh

      - name: Package release archive
        id: package
        shell: bash
        run: |
          targets=("aarch64-apple-darwin" "x86_64-apple-darwin")

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${{ inputs.version }}"
          fi

          if [[ -z "$version" ]]; then
            version="$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json,sys; data=json.load(sys.stdin); print(next(pkg["version"] for pkg in data["packages"] if pkg["name"] == "prismtrace-host"))')"
          fi

          for target in "${targets[@]}"; do
            scripts/package-release.sh --version "$version" --target "$target"

            tarball="target/release-kit/prismtrace-${version}-${target}.tar.gz"
            checksum="$tarball.sha256"
            test -f "$tarball"
            test -f "$checksum"
          done

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: prismtrace-release-kit
          path: |
            target/release-kit/prismtrace-${{ steps.package.outputs.version }}-*.tar.gz
            target/release-kit/prismtrace-${{ steps.package.outputs.version }}-*.tar.gz.sha256

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          assets=(target/release-kit/prismtrace-"$version"-*.tar.gz target/release-kit/prismtrace-"$version"-*.tar.gz.sha256)

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            gh release create "$tag" "${assets[@]}" \
              --title "$tag" \
              --notes "PrismTrace macOS alpha release kit for Apple Silicon and Intel."
          fi
