name: Release Kit

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional release version for manual packaging. Defaults to workspace package version."
        required: false
        default: ""
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos-release:
    name: macOS Release Kit
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-apple-darwin

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Run host discovery smoke test
        run: cargo run -p prismtrace-host -- --discover

      - name: Run release kit smoke test
        run: scripts/test-release-kit.sh

      - name: Package release archive
        id: package
        shell: bash
        run: |
          target="aarch64-apple-darwin"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${{ inputs.version }}"
          fi

          if [[ -n "$version" ]]; then
            scripts/package-release.sh --version "$version" --target "$target"
          else
            scripts/package-release.sh --target "$target"
            version="$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json,sys; data=json.load(sys.stdin); print(next(pkg["version"] for pkg in data["packages"] if pkg["name"] == "prismtrace-host"))')"
          fi

          tarball="target/release-kit/prismtrace-${version}-${target}.tar.gz"
          checksum="$tarball.sha256"
          test -f "$tarball"
          test -f "$checksum"

          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"
          echo "checksum=$checksum" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: prismtrace-release-kit
          path: |
            ${{ steps.package.outputs.tarball }}
            ${{ steps.package.outputs.checksum }}

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          tarball="${{ steps.package.outputs.tarball }}"
          checksum="${{ steps.package.outputs.checksum }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$tarball" "$checksum" --clobber
          else
            gh release create "$tag" "$tarball" "$checksum" \
              --title "$tag" \
              --notes "PrismTrace macOS alpha release kit."
          fi
